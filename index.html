    <meta name="description" content="Mohammed Thouffic - Senior React Developer Portfolio. Specializing in scalable, high-performance web applications with React." />
    <meta name="theme-color" content="#3b82f6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#171717" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mohammed Thouffic | Senior React Developer" />

    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mohammed Thouffic | Senior React Developer" />

    <link rel="canonical" href="https://umarshareef-design.github.io/thouffic-portfolio/" />
  </head>
  <body>
    <script>
      ;(function(){
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
